<p-toolbar>
  <ng-template #start>
    <span class="app-title">Starmourn Ship Builder</span>
  </ng-template>
  <ng-template #end>
    <p-button
      [icon]="theme.mode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
      [text]="true"
      (onClick)="theme.toggle()"
      [ariaLabel]="'Switch to ' + (theme.mode() === 'dark' ? 'light' : 'dark') + ' mode'"
    />
  </ng-template>
</p-toolbar>

<main class="builder">
  @if (data.loadError()) {
    <p class="error">Failed to load data: {{ data.loadError() }}</p>
  } @else if (!data.loaded()) {
    <p>Loading game data…</p>
  } @else {
    <section class="panel">
      <app-ship-picker />
    </section>

    <section class="panel">
      <app-loadout-editor />
    </section>

    <section class="panel">
      <app-mods-panel />
    </section>

    <div class="side-by-side">
      <section class="panel">
        <app-stats-panel />
      </section>

      <section class="panel">
        <app-command-output />
      </section>
    </div>
  }

  <router-outlet />
</main>
