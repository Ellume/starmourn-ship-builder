<p-toolbar>
  <ng-template #start>
    <span class="app-title">Starmourn Ship Builder</span>
  </ng-template>
  <ng-template #end>
    @if (commands().length) {
      <p-button icon="pi pi-copy" label="Copy commands" size="small" [text]="true" (onClick)="copyCommands()" />
      <p-button icon="pi pi-share-alt" label="Share link" size="small" [text]="true" (onClick)="copyShareLink()" />
      <p-button icon="pi pi-list" label="Ship Summary" size="small" [text]="true" (onClick)="summaryOpen.set(true)" />
    }
    <p-button
      [icon]="theme.mode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
      [text]="true"
      (onClick)="theme.toggle()"
      [ariaLabel]="'Switch to ' + (theme.mode() === 'dark' ? 'light' : 'dark') + ' mode'"
    />
  </ng-template>
</p-toolbar>

<p-drawer [(visible)]="summaryOpen" position="right" header="Ship Summary" [modal]="false" styleClass="summary-drawer">
  <app-ship-summary />
</p-drawer>

<main class="builder">
  @if (data.loadError()) {
    <p class="error">Failed to load data: {{ data.loadError() }}</p>
  } @else if (!data.loaded()) {
    <p>Loading game data…</p>
  } @else {
    <section class="panel">
      <app-ship-picker />
    </section>

    <section class="panel">
      <app-loadout-editor />
    </section>

    <section class="panel">
      <app-mods-panel />
    </section>
  }

  <router-outlet />
</main>
